controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: 'ackermann_steering_controller/AckermannSteeringController'

ackermann_steering_controller:
  ros__parameters: 
    wheelbase: 1.33
    front_wheel_track: 0.8
    rear_wheel_track: 0.8
    front_wheels_radius: 0.22
    rear_wheels_radius: 0.22
    front_steering: true
    reference_timeout: 2.0
    rear_wheels_names: ['right_backwheel2base_link', 'left_backwheel2base_link']
    front_wheels_names: ['right_bridge2base_link', 'left_bridge2base_link']
    use_stamped_vel: false
    open_loop: false
    enable_odom_tf: true
    publish_rate: 50.0
    base_frame_id: base_footprint
    odom_frame_id: odom
    twist_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    position_feedback: false